<!DOCTYPE html>
<html lang="ja">

<head>
	<title>放課後等デイサービスきゃんでぃーのホームページ</title>
	<meta charset="UTF-8" />
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div id="header"></div>

	<div class="body-schedule">

        <h2>送迎</h2>
        <p>・下校時間に学校へお迎えに行き自宅へ送ります<br>
            ・学校がお休みの日は自宅へお迎えに行きます<br>
            平日[下校時間～17:30]　休日[10:30～16:30]</p>
        <h2>ランチ</h2>
        <p>・休日や給食がない日には、手作りの温かい食事を300円で提供しています</p>
        <h2>おやつ</h2>
        <p>・おやつは無料サービスです（市販の物）<br>
            ・手作りクッキングを月に2回計画しています（クレープなど）</p>

        <h1>１日の流れ</h1>
        <div class="scheduletable">
			<img src="images/schedule1.PNG" alt="schedule">
		</div>

        <p>子ども一人一人に合わせた過ごし方を提案します♪<br>
            お絵描き・キーホルダー作り・ゲーム・工作<br>
            クッキング・レクリエーション（月2回）etc...<br>
            学校の宿題も職員が1対1の対応でしっかりサポートします！！
		</p>

	</div>

	<div id="footer"></div>

	<!-- ヘッダーとフッター -->
	<script>
		fetch("header.html")
			.then(response => response.text())
			.then(data => document.getElementById("header").innerHTML = data);

		fetch("footer.html")
			.then(response => response.text())
			.then(data => document.getElementById("footer").innerHTML = data);
	</script>

</body>

</html>
