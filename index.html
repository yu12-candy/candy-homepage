<!DOCTYPE html>
<html lang="ja">

<head>
	<title>放課後等デイサービスきゃんでぃーのホームページ</title>
	<meta charset="UTF-8" />
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div id="header"></div>

	<div class="body-index">

		<h1>放課後等デイサービス きゃんでぃーとは</h1>

	</div>

	<div id="footer"></div>

	<!-- ヘッダーとフッター -->
	<script>
		fetch("header.html")
			.then(response => response.text())
			.then(data => document.getElementById("header").innerHTML = data);

		fetch("footer.html")
			.then(response => response.text())
			.then(data => document.getElementById("footer").innerHTML = data);
	</script>

</body>

</html>
